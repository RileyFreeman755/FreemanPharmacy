<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kush Rider - Acces</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      overflow: hidden;
      background:
        linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
        url("NT.png") center center / cover no-repeat;
    }

    body.intro-running .page {
      opacity: 0;
      transform: scale(1.03);
      filter: blur(10px);
      pointer-events: none;
    }

    body.intro-playing .page {
      animation: pageReveal .95s ease forwards;
      animation-delay: 1.95s;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 217, 126, .12), transparent 26%),
        linear-gradient(135deg, #f8f5ed 0%, #e2d9c8 100%);
      cursor: pointer;
      padding: clamp(10px, 2vw, 20px);
    }

    .intro.playing {
      animation: introExit .78s ease forwards;
      animation-delay: 1.95s;
    }

    .intro::before,
    .intro::after {
      content: "";
      position: absolute;
      inset: -20%;
      pointer-events: none;
    }

    .intro::before {
      background:
        linear-gradient(115deg, transparent 0 42%, rgba(255, 255, 255, 0.16) 47%, transparent 54%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 6px);
      transform: translateX(-18%);
      mix-blend-mode: screen;
    }

    .intro.playing::before {
      animation: lightSweep 2.8s cubic-bezier(.2,.8,.2,1) forwards;
    }

    .intro::after {
      background: radial-gradient(circle at center, transparent 0 45%, rgba(0,0,0,.74) 100%);
    }

    .intro-inner {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 18px;
      text-align: center;
      width: 100%;
      height: 100%;
      min-height: min(720px, calc(100vh - 28px));
      overflow: hidden;
      border-radius: clamp(18px, 3vw, 34px);
      border: 4px solid rgba(38, 38, 36, .18);
      background:
        radial-gradient(circle at 16% 22%, rgba(255,255,255,.05), transparent 18%),
        linear-gradient(180deg, #1d1f1e 0%, #171918 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.06),
        0 28px 70px rgba(65, 48, 31, .22);
    }

    .intro-video {
      position: absolute;
      inset: 50% auto auto 50%;
      width: max(100%, 177.78vh);
      height: max(100%, 56.25vw);
      transform: translate(-50%, -50%) scale(1.18);
      object-fit: cover;
      opacity: .42;
      filter: contrast(1.08) brightness(.58) saturate(1.12);
      pointer-events: none;
      z-index: 0;
    }

    .intro-shade {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 178, 80, .1), transparent 24%),
        radial-gradient(ellipse at 50% 52%, rgba(18, 19, 18, .72) 0 18%, rgba(18, 19, 18, .38) 34%, transparent 56%),
        linear-gradient(180deg, rgba(18, 19, 18, .42), rgba(18, 19, 18, .78));
    }

    .intro-text-cover {
      position: absolute;
      left: 50%;
      bottom: 7%;
      z-index: 2;
      width: min(760px, 78vw);
      height: 110px;
      transform: translateX(-50%);
      border-radius: 999px;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, rgba(18, 19, 18, .82) 0 32%, rgba(18, 19, 18, .54) 48%, transparent 72%);
      filter: blur(8px);
      opacity: .8;
    }

    .intro-inner::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .intro-kicker {
      position: relative;
      z-index: 3;
      color: rgba(255, 245, 226, .7);
      font-size: .7rem;
      font-weight: 900;
      letter-spacing: .38em;
      text-transform: uppercase;
      text-shadow: 0 8px 28px rgba(0, 0, 0, .38);
    }

    .vault-scene {
      position: relative;
      z-index: 3;
      width: min(260px, 72vw);
      aspect-ratio: 1 / .9;
      display: grid;
      place-items: center;
      isolation: isolate;
      animation: vaultIdle 5.5s ease-in-out infinite;
    }

    .intro.playing .vault-scene {
      animation: vaultEnter 3.2s cubic-bezier(.16,.84,.24,1) forwards;
    }

    .vault-aura {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 224, 132, .48) 0 16%, rgba(255, 145, 28, .22) 34%, transparent 68%);
      filter: blur(9px);
      box-shadow:
        0 0 54px rgba(255, 177, 46, .34),
        0 0 120px rgba(255, 205, 112, .12);
    }

    .vault-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 190, 64, .82);
      box-shadow:
        0 0 22px rgba(255, 166, 39, .38),
        inset 0 0 24px rgba(255, 198, 72, .08);
    }

    .vault-ring.one {
      inset: 11%;
      animation: ringSpin 18s linear infinite;
    }

    .vault-ring.two {
      inset: 20%;
      border-style: solid;
      border-color: rgba(255, 211, 122, .45);
      animation: ringSpin 12s linear infinite reverse;
    }

    .vault-ring.three {
      inset: 28%;
      border-width: 1px;
      border-color: rgba(255,255,255,.22);
      animation: ringPulse 2.8s ease-in-out infinite;
    }

    .vault-door {
      position: absolute;
      width: 54%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 25%, rgba(255,255,255,.2), transparent 18%),
        linear-gradient(145deg, #2e302f 0%, #171918 58%, #090a09 100%);
      box-shadow:
        inset 0 0 0 7px rgba(255, 177, 46, .28),
        inset 0 -24px 42px rgba(0, 0, 0, .45),
        0 26px 70px rgba(0, 0, 0, .48);
    }

    .vault-door::before {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.28);
      box-shadow: inset 0 0 18px rgba(0, 0, 0, .44);
    }

    .vault-door::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22%;
      height: 22%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #efefea;
      box-shadow:
        0 0 0 10px rgba(255, 190, 64, .24),
        0 0 24px rgba(255, 142, 29, .5);
    }

    .vault-logo {
      position: relative;
      z-index: 5;
      width: 82px;
      height: 82px;
      object-fit: cover;
      border-radius: 50%;
      box-shadow:
        0 18px 38px rgba(0, 0, 0, .42),
        0 0 0 3px rgba(255, 190, 64, .78),
        0 0 34px rgba(255, 142, 29, .34);
    }

    .intro.playing .enter-hint {
      animation: fadeOutSoft .35s ease forwards;
    }

    .store-scene {
      position: relative;
      width: min(940px, 92vw);
      height: min(590px, 72vh);
      perspective: 1100px;
      transform-style: preserve-3d;
      filter: drop-shadow(0 32px 46px rgba(75, 48, 22, .24));
      animation: sceneFloat 5s ease-in-out infinite;
    }

    .intro.playing .store-scene {
      animation: cameraEnter 3.2s cubic-bezier(.16,.84,.24,1) forwards;
    }

    .sky-object {
      position: absolute;
      left: 50%;
      top: 2%;
      width: 180px;
      height: 38px;
      transform: translateX(-50%);
      border-radius: 60% 60% 44% 44%;
      background: linear-gradient(180deg, #ffffff, #cfd8df);
      box-shadow: 0 8px 18px rgba(35, 49, 64, .18);
      opacity: .86;
    }

    .sky-object::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -13px;
      width: 280px;
      height: 3px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #3a4248;
      animation: rotorSpin .12s linear infinite;
      opacity: .55;
    }

    .storefront {
      position: absolute;
      left: 50%;
      bottom: 9%;
      width: min(720px, 84vw);
      height: 360px;
      transform: translateX(-50%);
      border-radius: 10px 10px 4px 4px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.1), transparent 22%),
        linear-gradient(90deg, #d9c7b2 0%, #f2e7d7 50%, #d2bca3 100%);
      box-shadow:
        0 0 0 1px rgba(103, 72, 36, .2),
        0 28px 60px rgba(84, 58, 26, .2);
      overflow: hidden;
    }

    .storefront::after {
      content: "KUSH 75";
      position: absolute;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      color: rgba(93, 65, 35, .52);
      font-size: clamp(1rem, 3vw, 1.75rem);
      font-weight: 950;
      letter-spacing: .18em;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 2;
    }

    .storefront::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent 0 18px, rgba(63,44,28,.28) 18px 22px),
        linear-gradient(180deg, rgba(255,255,255,.32), transparent 42%);
      opacity: .62;
    }

    .store-sign {
      position: absolute;
      left: 50%;
      top: 46px;
      transform: translateX(-50%);
      color: rgba(55, 42, 31, .86);
      font-size: clamp(2.1rem, 7vw, 4.3rem);
      font-weight: 950;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(255,255,255,.45);
      white-space: nowrap;
      z-index: 3;
    }

    .store-logo {
      position: absolute;
      left: 50%;
      top: 155px;
      width: 74px;
      height: 74px;
      transform: translateX(-50%);
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 10px 26px rgba(0,0,0,.22);
      z-index: 3;
    }

    .glass-door {
      position: absolute;
      bottom: 0;
      width: 50%;
      height: 178px;
      background:
        linear-gradient(115deg, rgba(255,255,255,.42), rgba(255,255,255,.06) 45%, rgba(30,20,12,.08)),
        rgba(245, 248, 250, .18);
      border: 1px solid rgba(255,255,255,.38);
      backdrop-filter: blur(2px);
      z-index: 4;
    }

    .glass-door.left {
      left: 0;
      transform-origin: left center;
    }

    .glass-door.right {
      right: 0;
      transform-origin: right center;
    }

    .intro.playing .glass-door.left {
      animation: doorLeft 1.15s ease forwards;
      animation-delay: 1.35s;
    }

    .intro.playing .glass-door.right {
      animation: doorRight 1.15s ease forwards;
      animation-delay: 1.35s;
    }

    .floor {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 118%;
      height: 130px;
      transform: translateX(-50%) rotateX(62deg);
      transform-origin: bottom center;
      background:
        repeating-linear-gradient(90deg, rgba(180,160,135,.28) 0 2px, transparent 2px 56px),
        linear-gradient(180deg, #f4eee7, #cdbb9f);
      opacity: .9;
    }

    .car {
      position: absolute;
      bottom: 8%;
      width: 238px;
      height: 70px;
      color: #151515;
      filter: drop-shadow(0 18px 18px rgba(46, 36, 24, .18));
    }

    .car::before,
    .car::after {
      content: "";
      position: absolute;
      bottom: -10px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      z-index: 5;
      background:
        radial-gradient(circle, #f0f2f3 0 10%, #222831 11% 28%, #8c939b 29% 37%, #0c0d10 38% 68%, #2f3338 69%);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.1);
    }

    .car::before { left: 34px; }
    .car::after { right: 34px; }

    .car-body,
    .car-cabin,
    .car-light,
    .car-grille,
    .car-badge {
      position: absolute;
      display: block;
      pointer-events: none;
    }

    .car-body {
      left: 0;
      right: 0;
      bottom: 4px;
      height: 50px;
      z-index: 2;
      background:
        linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(242,244,246,.98) 48%, rgba(204,211,217,.98) 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.9),
        inset 0 -8px 16px rgba(28,34,40,.1);
    }

    .car-cabin {
      z-index: 3;
      background:
        linear-gradient(135deg, rgba(20,27,34,.9), rgba(93,108,118,.62) 58%, rgba(255,255,255,.62));
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.38);
    }

    .car-light {
      z-index: 4;
      bottom: 28px;
      width: 24px;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(90deg, #fff9d7, #ffc83d);
      box-shadow: 0 0 14px rgba(255, 202, 64, .75);
    }

    .car-grille {
      z-index: 4;
      bottom: 14px;
      width: 44px;
      height: 17px;
      border-radius: 5px;
      background:
        repeating-linear-gradient(90deg, #15191e 0 4px, #3d444c 4px 6px),
        #13171c;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.16);
    }

    .car-badge {
      z-index: 6;
      bottom: -42px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 112px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 247, 230, .88);
      color: #3b2414;
      font-size: .68rem;
      font-weight: 950;
      letter-spacing: .16em;
      text-align: center;
      text-transform: uppercase;
      box-shadow: 0 8px 18px rgba(87, 58, 28, .18);
    }

    .car.rs6 {
      left: 0;
      width: 285px;
      height: 84px;
      transform: rotate(-2deg);
    }

    .car.rs6 .car-body {
      height: 58px;
      border-radius: 52px 22px 16px 18px;
      background:
        linear-gradient(92deg, rgba(18,20,23,.55) 0 15%, transparent 16%),
        linear-gradient(180deg, #8f9293 0%, #64686a 38%, #343638 72%, #1e2022 100%);
      clip-path: polygon(2% 58%, 9% 37%, 25% 20%, 49% 13%, 82% 20%, 96% 42%, 100% 67%, 94% 100%, 4% 100%, 0 76%);
      box-shadow:
        inset 0 4px 0 rgba(255,255,255,.32),
        inset 0 -12px 18px rgba(0,0,0,.32);
    }

    .car.rs6 .car-body::before {
      content: "";
      position: absolute;
      left: 35px;
      right: 22px;
      top: 27px;
      height: 2px;
      background: rgba(18, 20, 22, .42);
      box-shadow: 0 18px 0 rgba(8,10,12,.54);
    }

    .car.rs6 .car-body::after {
      content: "";
      position: absolute;
      right: 42px;
      top: 28px;
      width: 6px;
      height: 28px;
      border-radius: 999px;
      background: rgba(10,12,14,.32);
      box-shadow:
        -47px 0 0 rgba(10,12,14,.22),
        -94px 0 0 rgba(10,12,14,.18);
    }

    .car.rs6 .car-cabin {
      left: 67px;
      bottom: 45px;
      width: 154px;
      height: 38px;
      border-radius: 44px 34px 7px 12px;
      background:
        linear-gradient(90deg, rgba(14,18,22,.96) 0 35%, rgba(41,51,58,.88) 36% 68%, rgba(207,217,221,.72) 69% 100%);
      clip-path: polygon(0 100%, 17% 18%, 53% 0, 89% 16%, 100% 100%);
      box-shadow:
        inset 0 0 0 2px rgba(230,236,238,.58),
        inset 68px 0 0 rgba(8,10,12,.35);
    }

    .car.rs6 .car-light {
      left: 22px;
      bottom: 34px;
      width: 38px;
      height: 8px;
      transform: skewX(-22deg);
      background:
        repeating-linear-gradient(90deg, #ffffff 0 6px, #cfd8dd 6px 8px);
      box-shadow: 0 0 15px rgba(255,255,255,.75);
    }

    .car.rs6 .car-grille {
      left: 38px;
      bottom: 13px;
      width: 74px;
      height: 31px;
      border-radius: 5px 13px 12px 8px;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,.22) 0 4%, transparent 5%),
        repeating-linear-gradient(135deg, #070809 0 5px, #1d2226 5px 9px);
      box-shadow:
        inset 0 0 0 2px rgba(0,0,0,.64),
        0 0 0 1px rgba(255,255,255,.12);
    }

    .car.rs6 .car-grille::after {
      content: "RS6";
      position: absolute;
      left: 14px;
      top: 9px;
      color: #f5f5f5;
      font-size: .56rem;
      font-weight: 950;
      letter-spacing: .08em;
      text-shadow: 8px 0 0 rgba(255,255,255,.7);
    }

    .car.rs6::before { left: 58px; }
    .car.rs6::after {
      right: 28px;
      width: 48px;
      height: 48px;
      bottom: -13px;
    }

    .car.charger {
      right: 0;
      transform: rotate(2deg);
    }

    .car.charger .car-body {
      border-radius: 22px 48px 16px 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(235,238,240,.98) 43%, rgba(183,191,199,.98) 100%);
      clip-path: polygon(0 52%, 10% 36%, 35% 23%, 70% 18%, 92% 36%, 100% 58%, 96% 100%, 4% 100%);
    }

    .car.charger .car-cabin {
      left: 78px;
      bottom: 38px;
      width: 90px;
      height: 28px;
      border-radius: 14px 32px 8px 5px;
      clip-path: polygon(0 100%, 16% 12%, 80% 0, 100% 100%);
    }

    .car.charger .car-light { left: 15px; }
    .car.charger .car-grille {
      left: 0;
      width: 56px;
      border-radius: 4px 10px 10px 4px;
    }

    .palm {
      position: absolute;
      bottom: 12%;
      width: 16px;
      height: 200px;
      border-radius: 999px;
      background: linear-gradient(90deg, #6f4826, #a27442, #56351c);
      transform-origin: bottom center;
    }

    .palm.left { left: 9%; transform: rotate(7deg); }
    .palm.right { right: 9%; transform: rotate(-7deg); }

    .palm::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -44px;
      width: 170px;
      height: 120px;
      transform: translateX(-50%);
      background:
        radial-gradient(ellipse at center, #2e7d43 0 12%, transparent 13%),
        conic-gradient(from 10deg, transparent 0 8%, #2e7d43 8% 15%, transparent 15% 23%, #3f9a55 23% 31%, transparent 31% 42%, #2e7d43 42% 50%, transparent 50% 61%, #3f9a55 61% 70%, transparent 70% 80%, #2e7d43 80% 88%, transparent 88%);
      border-radius: 50%;
      filter: drop-shadow(0 8px 7px rgba(0,0,0,.12));
    }

    .walkway {
      position: absolute;
      left: 50%;
      bottom: -3%;
      width: 370px;
      height: 190px;
      transform: translateX(-50%) perspective(520px) rotateX(64deg);
      transform-origin: top center;
      background:
        linear-gradient(90deg, transparent 0 20%, rgba(255,255,255,.3) 46% 54%, transparent 80%),
        repeating-linear-gradient(90deg, rgba(154, 132, 103, .14) 0 2px, transparent 2px 44px),
        linear-gradient(180deg, rgba(250,244,235,.92), rgba(211, 190, 156, .48));
      clip-path: polygon(42% 0, 58% 0, 100% 100%, 0 100%);
      opacity: .78;
      z-index: 1;
    }

    .enter-panel {
      position: absolute;
      left: 50%;
      bottom: 18px;
      z-index: 4;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .enter-btn {
      border: none;
      position: relative;
      z-index: 4;
      min-width: 172px;
      height: 46px;
      border-radius: 999px;
      cursor: pointer;
      color: #171918;
      font-weight: 950;
      letter-spacing: .2em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #fff08b 0%, #ffb347 50%, #ff7a1a 100%);
      box-shadow:
        0 18px 36px rgba(255, 152, 30, .24),
        0 0 0 1px rgba(255,255,255,.35) inset;
      transition: transform .18s ease, filter .18s ease;
    }

    .enter-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .enter-hint {
      position: relative;
      z-index: 4;
      color: rgba(255, 244, 226, .52);
      font-size: .68rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-weight: 800;
      cursor: pointer;
      transition: color .18s ease, transform .18s ease;
    }

    .enter-hint:hover {
      color: rgba(255, 244, 226, .82);
      transform: translateY(-1px);
    }


    .intro.playing .enter-panel {
      animation: fadeOut .42s ease forwards;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .card {
      width: 100%;
      max-width: 470px;
      border-radius: 34px;
      padding: 30px 26px 28px;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background:
        linear-gradient(180deg, rgba(34, 27, 18, 0.9), rgba(20, 21, 14, 0.86)),
        radial-gradient(circle at top, rgba(255, 207, 92, 0.12), transparent 42%);
      border: 1px solid rgba(255, 196, 0, 0.62);
      box-shadow:
        0 0 0 1px rgba(255, 213, 74, 0.08) inset,
        0 20px 50px rgba(0, 0, 0, 0.32),
        0 0 34px rgba(255, 166, 0, 0.18);
      animation: cardFloat 4.8s ease-in-out infinite;
    }

    .logo {
      width: 92px;
      height: 92px;
      object-fit: cover;
      border-radius: 22px;
      display: block;
      margin: 0 auto 14px;
      box-shadow:
        0 10px 30px rgba(0,0,0,.35),
        0 0 0 2px rgba(255, 214, 94, 0.18);
    }

    .title {
      font-size: 38px;
      line-height: .96;
      color: #ffb300;
      font-weight: 900;
      letter-spacing: 1.5px;

    .member-pill {

      margin: 0 auto 20px;
      padding: 9px 15px;
      border-radius: 999px;

      color: #fff0b4;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: 0 12px 24px rgba(0,0,0,.18);

    .wrapper {
      --input-focus: #ffb300;
      --font-color: #fff2c4;
      --font-color-sub: rgba(255, 244, 212, .48);
      --bg-color: rgba(8, 8, 7, .96);
      --main-color: #ffb300;
      width: 100%;
      display: grid;
      place-items: center;
      margin-top: 12px;
    }

    .card-switch {
      width: 100%;
      display: grid;
      place-items: center;
    }

    .switch {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    .card-side {
      position: relative;
      width: 58px;
      height: 26px;
      order: 1;
    }

    .card-side::before {
      content: "Connexion";
      position: absolute;
      right: 76px;
      top: 4px;
      width: 120px;
      color: var(--font-color);
      font-weight: 800;
      font-size: 13px;
      text-align: right;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .card-side::after {
      content: "Inscription";
      position: absolute;
      left: 76px;
      top: 4px;
      width: 120px;
      color: var(--font-color);
      font-weight: 800;
      font-size: 13px;
      text-align: left;
      text-decoration: none;
    }

    .toggle {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      top: 0;
      left: 50%;
      width: 58px;
      height: 26px;
      transform: translateX(-50%);
      border-radius: 8px;
      border: 2px solid var(--main-color);
      background-color: rgba(0, 0, 0, .66);
      box-shadow:
        4px 4px 0 rgba(0, 0, 0, .8),
        0 0 18px rgba(255, 179, 0, .2);
      cursor: pointer;
      transition: .3s;
      order: 0;
    }

    .slider::before {
      content: "";
      position: absolute;
      left: -2px;
      bottom: 2px;
      width: 22px;
      height: 22px;
      border: 2px solid var(--main-color);
      border-radius: 7px;
      background: linear-gradient(180deg, #ffe46f, #ffb300);
      box-shadow: 0 3px 0 rgba(0, 0, 0, .78);
      transition: .3s;
    }

    .toggle:checked + .slider {
      background-color: rgba(255, 179, 0, .24);
    }

    .toggle:checked + .slider::before {
      transform: translateX(32px);
    }

    .toggle:checked ~ .card-side::before {
      text-decoration: none;
    }

    .toggle:checked ~ .card-side::after {
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    body.has-local-account .slider,
    body.has-local-account .card-side {
      display: none;
    }

    body.has-local-account .switch {
      gap: 0;
    }

    .flip-card__inner {
      position: relative;
      width: 100%;
      height: 390px;
      perspective: 1000px;
      text-align: center;
      transition: transform .8s;
      transform-style: preserve-3d;
      order: 2;
    }

    .toggle:checked ~ .flip-card__inner {
      transform: rotateY(180deg);
    }

    .flip-card__front,
    .flip-card__back {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      padding: 20px;
      border-radius: 18px;
      border: 2px solid var(--main-color);
      background:
        linear-gradient(180deg, rgba(15, 15, 12, .98), rgba(5, 5, 5, .96)),
        radial-gradient(circle at top, rgba(255, 197, 79, .14), transparent 42%);

        4px 4px 0 rgba(0, 0, 0, .78),
        0 0 28px rgba(255, 179, 0, .18);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .flip-card__back {
      transform: rotateY(180deg);
    }

    .flip-card__title {
      color: var(--main-color);
      font-size: 25px;
      font-weight: 900;
      letter-spacing: .08em;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255, 179, 0, .42);
    }

    .flip-card__form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .flip-card__input {
      width: 100%;
      height: 44px;
      border-radius: 8px;
      border: 2px solid var(--main-color);
      background-color: var(--bg-color);
      box-shadow: 4px 4px 0 rgba(0, 0, 0, .78);
      color: var(--font-color);
      font-size: 15px;
      font-weight: 700;
      padding: 5px 12px;
      outline: none;

    .flip-card__input::placeholder {

    .flip-card__input:focus {
      border-color: var(--input-focus);

    .flip-card__btn {

      color: #101010;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .flip-card__btn:active {
      box-shadow: 0 0 0 rgba(0, 0, 0, .78);

    @keyframes logoDrop {
      to {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    @keyframes logoPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.16); }
    }

    @keyframes titleReveal {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.96);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes glitchShake {
      0%, 86%, 100% { transform: translate(0,0); }
      88% { transform: translate(-2px,1px); }
      90% { transform: translate(2px,-1px); }
      92% { transform: translate(-1px,0); }
    }

    @keyframes glitchLayer {
      0%, 82%, 100% { opacity: 0; clip-path: inset(0 0 0 0); }
      84% { opacity: .8; clip-path: inset(0 0 62% 0); }
      88% { opacity: .6; clip-path: inset(58% 0 12% 0); }
      92% { opacity: .75; clip-path: inset(20% 0 46% 0); }
    }

    @keyframes lineReveal {
      to { transform: scaleX(1); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes sceneFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-7px) scale(1.01); }
    }

    @keyframes vaultIdle {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.015); }
    }

    @keyframes vaultEnter {
      0% { transform: translateY(0) scale(1); filter: blur(0); opacity: 1; }
      34% { transform: translateY(-8px) scale(1.14); filter: blur(0); }
      70% { transform: translateY(5vh) scale(1.95); filter: blur(1px); opacity: 1; }
      100% { transform: translateY(12vh) scale(3.15); filter: blur(12px); opacity: 0; }
    }

    @keyframes ringSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: .78; }
      50% { transform: scale(1.08); opacity: .34; }
    }

    @keyframes fadeOutSoft {
      to {
        opacity: 0;
        transform: translateY(12px);
        pointer-events: none;
      }
    }

    @keyframes lightSweep {
      to { transform: translateX(18%); }
    }

    @keyframes introExit {
      to {
        opacity: 0;
        visibility: hidden;
        transform: scale(1.04);
        filter: blur(12px);
      }
    }

    @keyframes pageReveal {
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes cameraEnter {
      0% { transform: translateY(0) scale(1); filter: blur(0); }
      28% { transform: translateY(-4px) scale(1.12); }
      58% { transform: translateY(4vh) scale(1.55); filter: blur(0); }
      82% { transform: translateY(10vh) scale(2.08); filter: blur(1px); }
      100% { transform: translateY(16vh) scale(2.55); filter: blur(8px); }
    }

    @keyframes doorLeft {
      to { transform: perspective(700px) rotateY(-72deg); opacity: .35; }
    }

    @keyframes doorRight {
      to { transform: perspective(700px) rotateY(72deg); opacity: .35; }
    }

    @keyframes rotorSpin {
      to { transform: translateX(-50%) rotate(8deg); }
    }

    @keyframes fadeOut {
      to {

        transform: translateX(-50%) translateY(12px);

<body class="intro-running">
  <div class="intro" id="intro">
    <div class="intro-inner">

          <svg

  <div class="background"></div>

  <div class="page">
    <div class="card">
      <img src="TMR.png" alt="Logo" class="logo">

      <h1 class="title">Acces securise</h1>
      <p class="subtitle">Connexion locale sans email pour acceder au catalogue</p>
      <div class="member-pill"><span id="memberCount">0</span> membres inscrits</div>

      <div class="wrapper">
        <div class="card-switch">
          <div class="switch">
            <input class="toggle" id="authToggle" type="checkbox" onchange="switchMode(this.checked ? 'register' : 'login')">
            <label class="slider" for="authToggle" aria-label="Basculer entre connexion et inscription"></label>
            <label class="card-side" for="authToggle" aria-label="Basculer entre connexion et inscription"></label>
            <div class="flip-card__inner">
              <div class="flip-card__front">
                <div class="flip-card__title">Connexion</div>
                <form action="" class="flip-card__form" onsubmit="event.preventDefault(); submitAuth();">
                  <input type="text" id="username" placeholder="Pseudo" class="flip-card__input">
                  <input type="password" id="password" placeholder="Mot de passe" class="flip-card__input">
                  <input type="password" id="siteCode" placeholder="Code d'acces" class="flip-card__input">
                  <button class="flip-card__btn" id="submitBtn" type="submit">Se connecter</button>
                </form>
              </div>
              <div class="flip-card__back">
                <div class="flip-card__title">Inscription</div>
                <form action="" class="flip-card__form" onsubmit="event.preventDefault(); submitAuth();">
                  <input type="text" id="registerUsername" placeholder="Pseudo" class="flip-card__input">
                  <input type="password" id="registerPassword" placeholder="Mot de passe" class="flip-card__input">
                  <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" class="flip-card__input">
                  <input type="password" id="registerAccessCode" placeholder="Code d'acces" class="flip-card__input">
                  <button class="flip-card__btn" type="submit">Creer mon compte</button>
                </form>
              </div>

      </div>

      <div class="note" id="modeNote">Connecte-toi avec ton pseudo, ton mot de passe et ton code d'acces.</div>
      <div class="error" id="error">Informations incorrectes.</div>
      <div class="success" id="success">Compte cree, connexion en cours...</div>

      <div class="help">
        Besoin d'acces ? <a href="https://www.instagram.com/kush.rider75/" target="_blank">Contact</a>
      </div>

      <div class="dot"></div>
    </div>
  </div>

  <script>
    const intro = document.getElementById("intro");
    const startIntro = document.getElementById("startIntro");

    function launchIntro() {
      if (!intro || intro.classList.contains("playing")) {
        return;
      }

      intro.classList.add("playing");
      document.body.classList.add("intro-playing");

      setTimeout(function() {
        document.body.classList.remove("intro-running");
        document.body.classList.remove("intro-playing");
        if (intro) {
          intro.remove();
        }
      }, 720);
    }

    startIntro.addEventListener("click", launchIntro);

    const SESSION_KEY = "kush75_session";
    const API_BASE = "https://freemanpharmacy.onrender.com";
    let authMode = "login";

    function apiUrl(path) {
      return API_BASE + path;
    }

    function storedAccountUsername() {
      const username = localStorage.getItem(SESSION_KEY) || "";
      return username && username !== "acces-code" ? username : "";
    }

    function hasLocalAccount() {
      return Boolean(storedAccountUsername());
    }

    function applyAccountMode() {
      const username = storedAccountUsername();
      document.body.classList.toggle("has-local-account", Boolean(username));
      if (!username) {
        return;
      }

      const usernameInput = document.getElementById("username");
      const authToggle = document.getElementById("authToggle");
      if (usernameInput && !usernameInput.value) {
        usernameInput.value = username;
      }
      if (authToggle) {
        authToggle.checked = false;
      }
      authMode = "login";
    }

    async function apiRequest(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(function() {
        return { ok: false, error: "Serveur de connexion indisponible. Le site doit etre ouvert avec le serveur Node actif." };
      });
      if (!response.ok || !data.ok) {
        throw new Error(data.error || "Erreur serveur.");
      }
      return data;
    }

    async function updateMemberCount() {
      const memberCountEl = document.getElementById("memberCount");
      if (!memberCountEl) {
        return;
      }
      try {
        const response = await fetch(apiUrl("/api/auth/session"), { credentials: "include" });
        const data = await response.json();
        const memberCount = Number(data.memberCount || 0);
        memberCountEl.innerText = String(memberCount);
        if (!data.authenticated && memberCount === 0) {
          localStorage.removeItem(SESSION_KEY);
          applyAccountMode();
        }
      } catch (error) {
        memberCountEl.innerText = "0";
      }
    }

    function setSession(username) {
      localStorage.setItem(SESSION_KEY, username);
      applyAccountMode();
    }

    function redirectToCatalogue() {
      window.location.href = "catalogue.html";
    }

    function resetMessages() {
      document.getElementById("error").style.display = "none";
      document.getElementById("success").style.display = "none";
    }

    function switchMode(mode) {
      if (mode === "register" && hasLocalAccount()) {
        mode = "login";
      }
      authMode = mode;
      const isRegister = mode === "register";
      const authToggle = document.getElementById("authToggle");
      if (authToggle) {
        authToggle.checked = isRegister;
      }
      document.getElementById("modeNote").innerText = isRegister
        ? "Cree un compte avec ton code d'acces prive."
        : "Connecte-toi avec ton pseudo, ton mot de passe et ton code d'acces.";
      resetMessages();
    }

    async function submitAuth() {
      const isRegister = authMode === "register";
      const username = (isRegister
        ? document.getElementById("registerUsername").value
        : document.getElementById("username").value).trim();
      const password = isRegister
        ? document.getElementById("registerPassword").value
        : document.getElementById("password").value;
      const siteCode = document.getElementById("siteCode").value;
      const registerAccessCode = document.getElementById("registerAccessCode").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const error = document.getElementById("error");
      const success = document.getElementById("success");

      resetMessages();

      if (!username || username.length < 3) {
        error.innerText = "Choisis un pseudo d'au moins 3 caracteres.";
        error.style.display = "block";
        return;
      }

      if (!password || password.length < 4) {
        error.innerText = "Le mot de passe doit faire au moins 4 caracteres.";
        error.style.display = "block";
        return;
      }

      if (!isRegister && !siteCode) {
        error.innerText = "Entre le code d'acces.";
        error.style.display = "block";
        return;
      }

      if (isRegister) {
        if (!registerAccessCode) {
          error.innerText = "Entre le code d'acces.";
          error.style.display = "block";
          return;
        }

        if (password !== confirmPassword) {
          error.innerText = "Les mots de passe ne correspondent pas.";
          error.style.display = "block";
          return;
        }

        try {
          const data = await apiRequest(apiUrl("/api/auth/register"), {
            username: username,
            password: password,
            confirmPassword: confirmPassword,
            accessCode: registerAccessCode
          });
          setSession(data.user.username);
          success.innerText = "Compte cree, connexion en cours...";
          success.style.display = "block";
          updateMemberCount();
          setTimeout(redirectToCatalogue, 450);
        } catch (requestError) {
          error.innerText = requestError.message;
          error.style.display = "block";
        }
        return;
      }

      try {
        const data = await apiRequest(apiUrl("/api/auth/login"), {
          username: username,
          password: password,
          accessCode: siteCode
        });
        setSession(data.user.username);
        redirectToCatalogue();
      } catch (requestError) {
        error.innerText = requestError.message;
        error.style.display = "block";
      }
    }

    document.getElementById("password").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        submitAuth();
      }
    });

    document.getElementById("registerPassword").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        submitAuth();
      }
    });

    document.getElementById("confirmPassword").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        submitAuth();
      }
    });

    document.getElementById("username").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        submitAuth();
      }
    });

    document.getElementById("registerUsername").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        submitAuth();
      }
    });

    document.getElementById("registerAccessCode").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        submitAuth();
      }
    });

    document.getElementById("siteCode").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        submitAuth();
      }
    });

    applyAccountMode();

    fetch(apiUrl("/api/auth/session"), { credentials: "include" })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.authenticated && data.user) {
          setSession(data.user.username);
          redirectToCatalogue();
        }
      })
      .catch(function() {});

    updateMemberCount();
  </script>
